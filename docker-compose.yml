# =========================================================================
# Local dev + Coolify deploy compose for payunivercart.
#
# Bring up everything with: `pnpm docker:up`
# Stop everything: `pnpm docker:down`
#
# Coolify reads the same file when deploying to app.univercart.com.
# Coolify owns reverse-proxy via Traefik: no custom networks, no custom
# nginx, no `ports:` host binding. Each user-facing service uses `expose:`
# and gets its Traefik route from the "Domains for <service>" UI entry
# (must include `:<port>` suffix when the service listens on a non-80
# port, e.g. `https://api.univercart.com:4000`).
# =========================================================================

name: payunivercart

services:
  # -----------------------------------------------------------------------
  # PostgreSQL — primary database. Pinned to 17 to match what Coolify ships.
  # The `events_audit` lockdown trigger + RLS policies are applied as a
  # post-migration step via the `migrate` service below.
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payunivercart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-payunivercart}
      # `--data-checksums` is irreversible; opting in from day one.
      POSTGRES_INITDB_ARGS: "--data-checksums --auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payunivercart} -d ${POSTGRES_DB:-payunivercart}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -----------------------------------------------------------------------
  # Redis — BullMQ queues + caches (chatId resolver, rate-limit counters).
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -----------------------------------------------------------------------
  # WAHA — local fallback only. Enable with `--profile local-waha`.
  # In production we point WAHA_BASE_URL at an external instance
  # (e.g. whatsapp.univerzap.cloud) so this container stays off.
  # -----------------------------------------------------------------------
  waha:
    image: devlikeapro/waha-plus:latest
    restart: unless-stopped
    profiles: [local-waha]
    environment:
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY required}
      WAHA_WEBHOOK_HMAC_SECRET: ${WAHA_WEBHOOK_SECRET:?WAHA_WEBHOOK_SECRET required}
      WAHA_LOG_LEVEL: info
    volumes:
      - waha-sessions:/app/.sessions

  # -----------------------------------------------------------------------
  # Drizzle migration runner. One-shot service that runs the SQL files +
  # the RLS policies + audit lockdown then exits. The api depends on it
  # via `service_completed_successfully` so we never start serving before
  # the schema is up to date.
  # -----------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    # `set -e` aborts on first failure (also implicit via `&&` chain
    # but explicit is clearer). `set -x` echoes each command before
    # running so the docker logs identify which step blew up — Coolify
    # only shows the last lines of stdout on deploy failure, so we want
    # every command name in there. `ON_ERROR_STOP=1` makes psql exit
    # non-zero on the first SQL error instead of swallowing it (the
    # default of psql is to continue + return 0 even on errors, which
    # would let a broken RLS policy slip past the migrate gate).
    command: >
      sh -ex -c "
        echo '[migrate] step 1/3: drizzle JS migrator' &&
        pnpm --filter @payunivercart/db migrate &&
        echo '[migrate] step 2/3: RLS policies' &&
        psql -v ON_ERROR_STOP=1 \"$$DATABASE_URL\" -f packages/db/sql/02_rls_policies.sql &&
        echo '[migrate] step 3/3: audit lockdown' &&
        psql -v ON_ERROR_STOP=1 \"$$DATABASE_URL\" -f packages/audit/sql/01_lockdown.sql &&
        echo '[migrate] done.'
      "
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-payunivercart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-payunivercart}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # -----------------------------------------------------------------------
  # API — Hono + tRPC backend. Stateless; horizontally scalable.
  # Traefik route: `Domains for api` = `https://api.univercart.com:4000`.
  # -----------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    restart: unless-stopped
    expose: ["4000"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-payunivercart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-payunivercart}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET required}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-http://localhost:3000}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-}
      # WAHA_BASE_URL points at the external WAHA instance in production
      # (e.g. https://whatsapp.univerzap.cloud) and falls back to the
      # internal `waha` service only when the `local-waha` profile is up.
      WAHA_BASE_URL: ${WAHA_BASE_URL:-http://waha:3000}
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY required}
      WAHA_DEFAULT_SESSION: ${WAHA_DEFAULT_SESSION:-default}
      WAHA_WEBHOOK_SECRET: ${WAHA_WEBHOOK_SECRET:?WAHA_WEBHOOK_SECRET required}
      ENCRYPTION_KEYS: ${ENCRYPTION_KEYS:?ENCRYPTION_KEYS required}
      ENCRYPTION_ACTIVE_KEY_ID: ${ENCRYPTION_ACTIVE_KEY_ID:-v1}
      AUDIT_KEYS: ${AUDIT_KEYS:?AUDIT_KEYS required}
      AUDIT_ACTIVE_KEY_ID: ${AUDIT_ACTIVE_KEY_ID:-v1}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      # tsx cold-start under linux/amd64 can take 30-60s once the
      # workspace symlinks have to resolve, so leave plenty of slack
      # before Traefik gives up on routing.
      retries: 15
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      # Local `waha` is opt-in via the `local-waha` profile. When the
      # profile is OFF (production using an external WAHA) Docker
      # Compose skips this dependency entirely.
      waha:
        condition: service_started
        required: false

  # -----------------------------------------------------------------------
  # Dashboard — Next.js, producer-facing.
  # Traefik route: `Domains for dashboard` = `https://app.univercart.com:3000`.
  # -----------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard-runtime
      args:
        # Next.js bakes NEXT_PUBLIC_* at build time; the runtime
        # `environment:` block can't influence the client bundle.
        # Pass-through so `coolify .env` overrides reach the build.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.univercart.com}
        NEXT_PUBLIC_CHECKOUT_URL: ${NEXT_PUBLIC_CHECKOUT_URL:-https://pay.univercart.com}
    restart: unless-stopped
    expose: ["3000"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.univercart.com}
      # Used by the dashboard's "Link de checkout" column + product
      # edit page so the displayed URL points at the buyer-facing
      # subdomain instead of the dashboard origin.
      NEXT_PUBLIC_CHECKOUT_URL: ${NEXT_PUBLIC_CHECKOUT_URL:-https://pay.univercart.com}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.ok || r.status === 404 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      api:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Checkout — Next.js, public-facing.
  # Traefik route: `Domains for checkout` = `https://pay.univercart.com:3001`.
  # -----------------------------------------------------------------------
  checkout:
    build:
      context: .
      dockerfile: Dockerfile
      target: checkout-runtime
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.univercart.com}
    restart: unless-stopped
    expose: ["3001"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.univercart.com}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/').then(r => process.exit(r.ok || r.status === 404 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      api:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Admin — Next.js, operator-only.
  # Traefik route: `Domains for admin` = `https://admin.univercart.com:3002`.
  # IP allowlist for this surface lives in Coolify (NEVER trust the app
  # alone for the gate).
  # -----------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-runtime
    restart: unless-stopped
    expose: ["3002"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.univercart.com}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3002/').then(r => process.exit(r.ok || r.status === 404 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      api:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Workers — BullMQ processors. Stateless; reads from Redis (queues) and
  # Postgres (audit chain, recovery_attempts, webhooks_inbound). Uses the
  # `worker` Postgres role with BYPASSRLS (see packages/db/sql/README.md).
  # -----------------------------------------------------------------------
  workers:
    build:
      context: .
      dockerfile: Dockerfile
      target: workers-runtime
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-payunivercart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-payunivercart}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      WAHA_BASE_URL: ${WAHA_BASE_URL:-http://waha:3000}
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY required}
      ENCRYPTION_KEYS: ${ENCRYPTION_KEYS:?ENCRYPTION_KEYS required}
      ENCRYPTION_ACTIVE_KEY_ID: ${ENCRYPTION_ACTIVE_KEY_ID:-v1}
      AUDIT_KEYS: ${AUDIT_KEYS:?AUDIT_KEYS required}
      AUDIT_ACTIVE_KEY_ID: ${AUDIT_ACTIVE_KEY_ID:-v1}
      WORKERS_CONCURRENCY: ${WORKERS_CONCURRENCY:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  waha-sessions:

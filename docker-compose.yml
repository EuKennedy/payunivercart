# =========================================================================
# Local dev + Coolify deploy compose for payunivercart.
#
# Bring up everything with: `pnpm docker:up`
# Stop everything: `pnpm docker:down`
#
# Coolify reads the same file when deploying to pay.univercart.com.
# Coolify-specific env (DOMAIN, traefik labels) are layered on top via the
# Coolify dashboard.
# =========================================================================

name: payunivercart

services:
  # -----------------------------------------------------------------------
  # PostgreSQL — primary database. Pinned to 17 to match what Coolify ships.
  # The `events_audit` lockdown trigger + RLS policies are applied as a
  # post-migration step via the `migrate` service below.
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payunivercart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-payunivercart}
      # `--data-checksums` is irreversible; opting in from day one.
      POSTGRES_INITDB_ARGS: "--data-checksums --auth-host=scram-sha-256"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payunivercart} -d ${POSTGRES_DB:-payunivercart}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [internal]

  # -----------------------------------------------------------------------
  # Redis — BullMQ queues + caches (chatId resolver, rate-limit counters).
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  # -----------------------------------------------------------------------
  # WAHA — local fallback only. Enable with `--profile local-waha`.
  # In production we point WAHA_BASE_URL at an external instance
  # (e.g. whatsapp.univerzap.cloud) so this container stays off.
  # -----------------------------------------------------------------------
  waha:
    image: devlikeapro/waha-plus:latest
    restart: unless-stopped
    profiles: [local-waha]
    environment:
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY required}
      WAHA_WEBHOOK_HMAC_SECRET: ${WAHA_WEBHOOK_SECRET:?WAHA_WEBHOOK_SECRET required}
      WAHA_LOG_LEVEL: info
    volumes:
      - waha-sessions:/app/.sessions
    networks: [internal]

  # -----------------------------------------------------------------------
  # Drizzle migration runner. One-shot service that runs the SQL files +
  # the RLS policies + audit lockdown then exits. The api depends on it
  # via `service_completed_successfully` so we never start serving before
  # the schema is up to date.
  # -----------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: >
      sh -c "
        pnpm --filter @payunivercart/db migrate &&
        psql \"$$DATABASE_URL\" -f packages/db/sql/02_rls_policies.sql &&
        psql \"$$DATABASE_URL\" -f packages/audit/sql/01_lockdown.sql
      "
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-payunivercart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-payunivercart}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: "no"

  # -----------------------------------------------------------------------
  # API — Hono + tRPC backend. Stateless; horizontally scalable.
  # -----------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-payunivercart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-payunivercart}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET required}
      AUTH_TRUSTED_ORIGINS: ${AUTH_TRUSTED_ORIGINS:-http://localhost:3000}
      # WAHA_BASE_URL points at the external WAHA instance in production
      # (e.g. https://whatsapp.univerzap.cloud) and falls back to the
      # internal `waha` service only when the `local-waha` profile is up.
      WAHA_BASE_URL: ${WAHA_BASE_URL:-http://waha:3000}
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY required}
      WAHA_DEFAULT_SESSION: ${WAHA_DEFAULT_SESSION:-default}
      WAHA_WEBHOOK_SECRET: ${WAHA_WEBHOOK_SECRET:?WAHA_WEBHOOK_SECRET required}
      ENCRYPTION_KEYS: ${ENCRYPTION_KEYS:?ENCRYPTION_KEYS required}
      ENCRYPTION_ACTIVE_KEY_ID: ${ENCRYPTION_ACTIVE_KEY_ID:-v1}
      AUDIT_KEYS: ${AUDIT_KEYS:?AUDIT_KEYS required}
      AUDIT_ACTIVE_KEY_ID: ${AUDIT_ACTIVE_KEY_ID:-v1}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      # Local `waha` is opt-in via the `local-waha` profile. When the
      # profile is OFF (production using an external WAHA) Docker
      # Compose skips this dependency entirely. The `required: false`
      # makes it a soft link when the profile IS on, so api still
      # starts if waha is mid-boot.
      waha:
        condition: service_started
        required: false
    networks: [internal, public]

  # -----------------------------------------------------------------------
  # Dashboard — Next.js, producer-facing. Port 3000 internal.
  #
  # Gated behind the `frontends` profile while we work through a Next 16
  # prerender quirk (see docs/DEPLOY.md). Enable on the next deploy with
  # `--profile frontends`.
  # -----------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    profiles: [frontends]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

  # -----------------------------------------------------------------------
  # Checkout — Next.js, public-facing. Port 3001 internal.
  # See `dashboard` note above on the `frontends` profile.
  # -----------------------------------------------------------------------
  checkout:
    build:
      context: .
      dockerfile: apps/checkout/Dockerfile
    restart: unless-stopped
    profiles: [frontends]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

  # -----------------------------------------------------------------------
  # Admin — Next.js, operator-only. Port 3002 internal. Nginx gates
  # access via Coolify-side IP allowlist (set per deploy).
  # See `dashboard` note above on the `frontends` profile.
  # -----------------------------------------------------------------------
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    profiles: [frontends]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]

  # -----------------------------------------------------------------------
  # Workers — BullMQ processors. Stateless; sits inside `internal` only,
  # never exposed to the outside. Reads from Redis (queues) and Postgres
  # (audit chain, recovery_attempts, webhooks_inbound). Uses the `worker`
  # Postgres role with BYPASSRLS (see packages/db/sql/README.md).
  # -----------------------------------------------------------------------
  workers:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-payunivercart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-payunivercart}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      WAHA_BASE_URL: ${WAHA_BASE_URL:-http://waha:3000}
      WAHA_API_KEY: ${WAHA_API_KEY:?WAHA_API_KEY required}
      ENCRYPTION_KEYS: ${ENCRYPTION_KEYS:?ENCRYPTION_KEYS required}
      ENCRYPTION_ACTIVE_KEY_ID: ${ENCRYPTION_ACTIVE_KEY_ID:-v1}
      AUDIT_KEYS: ${AUDIT_KEYS:?AUDIT_KEYS required}
      AUDIT_ACTIVE_KEY_ID: ${AUDIT_ACTIVE_KEY_ID:-v1}
      WORKERS_CONCURRENCY: ${WORKERS_CONCURRENCY:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  # -----------------------------------------------------------------------
  # Nginx — terminates TLS (Coolify provides the cert via Let's Encrypt)
  # and reverse-proxies to the api and (later) the dashboard/checkout/admin.
  # On local dev we serve plain HTTP and skip TLS.
  # -----------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      # The three Next.js frontends are profile-gated; nginx waits on them
      # only when they're enabled via `--profile frontends`. Using the
      # `required: false` form keeps the dependency soft so nginx can boot
      # in backend-only mode.
      dashboard:
        condition: service_started
        required: false
      checkout:
        condition: service_started
        required: false
      admin:
        condition: service_started
        required: false
    networks: [internal, public]

volumes:
  postgres-data:
  redis-data:
  waha-sessions:

networks:
  # Containers talk to each other on `internal`; only nginx is exposed.
  internal:
    internal: true
  public: {}

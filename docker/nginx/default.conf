upstream api_upstream       { server api:4000;       keepalive 16; }
upstream dashboard_upstream { server dashboard:3000; keepalive 16; }
upstream checkout_upstream  { server checkout:3001;  keepalive 16; }
upstream admin_upstream     { server admin:3002;     keepalive 16; }

server_tokens off;

proxy_http_version 1.1;
proxy_set_header   Host $host;
proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;
proxy_set_header   X-Real-IP $remote_addr;
proxy_read_timeout 30s;
proxy_send_timeout 30s;

# =========================================================================
# Production routing (Coolify): pay.univercart.com / checkout.univercart.com
# / admin.univercart.com each point at this nginx with the matching host
# header — Coolify's Traefik adds the cert before this layer sees the
# request. In single-host dev mode we serve everything through the default
# server below.
# =========================================================================

server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 1m;

  # Coolify health probe.
  location = /health {
    proxy_pass http://api_upstream;
    proxy_read_timeout 5s;
    access_log off;
  }

  # Better-Auth handlers (cookies travel here).
  location /api/auth/ { proxy_pass http://api_upstream; }

  # tRPC + inbound webhooks always hit the api.
  location /trpc/      { proxy_pass http://api_upstream; }
  location /webhooks/  { proxy_pass http://api_upstream; }

  # Single-host dev fallback: serve the dashboard.
  location / {
    proxy_pass http://dashboard_upstream;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  # Checkout host. Match `checkout.<anything>` so dev + prod both work.
  listen 80;
  server_name checkout.* checkout-*;
  location / { proxy_pass http://checkout_upstream; }
}

server {
  # Admin host. The IP allowlist for this surface lives upstream in
  # Coolify or in the perimeter firewall — NEVER trust nginx alone for
  # the gate.
  listen 80;
  server_name admin.* admin-*;
  location / { proxy_pass http://admin_upstream; }
}

# =========================================================================
# Production routing (Coolify): api.univercart.com / pay.univercart.com /
# check.univercart.com / admin.univercart.com each point at this nginx
# with the matching host header — Coolify's Traefik adds the cert before
# this layer sees the request. In single-host dev mode we serve everything
# through the default server below.
#
# Upstreams are resolved LAZILY via Docker's embedded DNS so nginx boots
# even when the `frontends` profile (dashboard / checkout / admin) is
# disabled. Without this trick nginx would refuse to start the moment any
# upstream hostname isn't resolvable at config-load time.
# =========================================================================

resolver 127.0.0.11 valid=30s ipv6=off;

server_tokens off;

proxy_http_version 1.1;
proxy_set_header   Host $host;
proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;
proxy_set_header   X-Real-IP $remote_addr;
proxy_read_timeout 30s;
proxy_send_timeout 30s;

# -------------------------------------------------------------------------
# Default server — single-host dev + the api.univercart.com prod surface.
# Always routes API/auth/trpc/webhooks paths to the api service.
# -------------------------------------------------------------------------
server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 1m;

  # Coolify health probe.
  location = /health {
    set $upstream_api api:4000;
    proxy_pass http://$upstream_api;
    proxy_read_timeout 5s;
    access_log off;
  }

  # Better-Auth handlers (cookies travel here).
  location /api/auth/ {
    set $upstream_api api:4000;
    proxy_pass http://$upstream_api;
  }

  # tRPC + inbound webhooks always hit the api.
  location /trpc/ {
    set $upstream_api api:4000;
    proxy_pass http://$upstream_api;
  }
  location /webhooks/ {
    set $upstream_api api:4000;
    proxy_pass http://$upstream_api;
  }

  # Single-host dev fallback: serve the dashboard if it's up, otherwise
  # return a small 503. The variable-style upstream makes this fail with a
  # readable error when the `frontends` profile is off.
  location / {
    set $upstream_dashboard dashboard:3000;
    proxy_pass http://$upstream_dashboard;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_intercept_errors on;
    error_page 502 503 504 = @frontend_off;
  }

  location @frontend_off {
    default_type application/json;
    return 503 '{"status":"frontend_disabled","detail":"Enable the frontends compose profile to serve the dashboard."}';
  }
}

# -------------------------------------------------------------------------
# Checkout — check.<host>. 503s cleanly if the profile is off.
# -------------------------------------------------------------------------
server {
  listen 80;
  server_name check.* check-* checkout.* checkout-*;
  location / {
    set $upstream_checkout checkout:3001;
    proxy_pass http://$upstream_checkout;
    proxy_intercept_errors on;
    error_page 502 503 504 = @checkout_off;
  }
  location @checkout_off {
    default_type application/json;
    return 503 '{"status":"checkout_disabled"}';
  }
}

# -------------------------------------------------------------------------
# Admin — admin.<host>. IP allowlist for this surface lives upstream in
# Coolify or the perimeter firewall — NEVER trust nginx alone for the gate.
# -------------------------------------------------------------------------
server {
  listen 80;
  server_name admin.* admin-*;
  location / {
    set $upstream_admin admin:3002;
    proxy_pass http://$upstream_admin;
    proxy_intercept_errors on;
    error_page 502 503 504 = @admin_off;
  }
  location @admin_off {
    default_type application/json;
    return 503 '{"status":"admin_disabled"}';
  }
}

upstream api_upstream {
  server api:4000;
  keepalive 16;
}

# Hardening defaults for every server block below.
server_tokens off;

server {
  listen 80 default_server;
  server_name _;

  # Frontends will join this block when they land. For now nginx fronts
  # only the api so we always proxy. Reject unknown methods early.
  if ($request_method !~ ^(GET|HEAD|POST|PATCH|DELETE|OPTIONS)$) {
    return 405;
  }

  # Health probe used by Coolify / external uptime monitors.
  location = /health {
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 5s;
    access_log off;
  }

  # tRPC routes. The 30s timeout is generous; individual gateways have
  # their own timeouts inside the api.
  location /trpc/ {
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  # Default: 404 instead of leaking nginx version page.
  location / {
    return 404;
  }
}

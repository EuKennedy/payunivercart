name: Setup pnpm + Node
description: >-
  Composite action that pins pnpm + Node to the same versions used in
  production (Dockerfile) and installs the workspace with the
  frozen-lockfile guarantee. Every CI job calls this so a single change
  to the Node/pnpm version is one edit, not N.

inputs:
  install-args:
    description: 'Extra args appended to `pnpm install`.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        # Keep this synced with apps/api/Dockerfile + apps/workers/Dockerfile
        # ARG PNPM_VERSION. CI version drift caused phantom `peer dep
        # mismatch` warnings between local and prod builds before we
        # standardized it here.
        version: 9.12.3

    - name: Install Node
      uses: actions/setup-node@v4
      with:
        # Same rule as pnpm above: match the Dockerfile.
        node-version: 22.11.0
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile ${{ inputs.install-args }}

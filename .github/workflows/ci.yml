name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege at the workflow level. Individual jobs grant more only
# when they truly need it (e.g. `dependency-review` reads PR diffs).
permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------- #
  # FAST FEEDBACK — these jobs run in parallel and gate the PR.           #
  # Lint + typecheck + unit tests block the merge button via branch       #
  # protection (configured in .github/BRANCH_PROTECTION.md).              #
  # --------------------------------------------------------------------- #

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # Turbo doesn't forward extra args to each package's vitest, so we
      # rely on each package's vitest.config.ts reporter setting (the
      # default + GHA actions/upload-artifact below already give us
      # enough log + the coverage tarball for flake triage).
      - run: pnpm test
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage/**'
          if-no-files-found: ignore
          retention-days: 7

  # --------------------------------------------------------------------- #
  # BUILD VERIFICATION — typecheck passing ≠ Next.js prod build passing.  #
  # Catches RSC / dynamic-import / env-baking bugs that only surface in   #
  # `next build` (we hit this with the admin builder OOM + the missing   #
  # packages/notifications COPY).                                         #
  # --------------------------------------------------------------------- #

  build:
    name: Build (all apps + packages)
    runs-on: ubuntu-latest
    env:
      # NEXT_PUBLIC_* are baked at build time. Use placeholders so the
      # build completes without leaking prod values; the runtime container
      # injects the real values via Coolify env.
      NEXT_PUBLIC_API_URL: https://api.univercart.com
      NEXT_PUBLIC_CHECKOUT_URL: https://pay.univercart.com
      # Next caps each worker's heap. We hit OOM on the admin build at
      # 1024 MiB; 2048 is the same value we use in the Dockerfile.
      NODE_OPTIONS: '--max-old-space-size=2048'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm build
      # Bundle size visibility — print First Load JS shared + per-page
      # output of every Next app. No threshold enforced yet (tier 3
      # baseline TODO); the goal is to surface bloat in PR diffs so a
      # 200kb chunk landing on /produtos is caught before merge.
      - name: Bundle size report
        if: always()
        run: |
          set -e
          for app in dashboard checkout admin; do
            echo "=== ${app} bundle ==="
            if [ -d "apps/${app}/.next" ]; then
              find apps/${app}/.next/static/chunks -maxdepth 2 -name '*.js' \
                -printf '%-60p %k KB\n' 2>/dev/null \
                | sort -k2 -n -r \
                | head -20 || true
            else
              echo "(no .next build output)"
            fi
            echo ""
          done

  # --------------------------------------------------------------------- #
  # DATABASE — proves drizzle migrations + integration queries work       #
  # against a REAL Postgres (not a mock). Catches the class of bugs that  #
  # took out the marketplace listings (migration 0020 not applied).      #
  # --------------------------------------------------------------------- #

  db-integration:
    name: DB migration + integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: payunivercart
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: payunivercart_ci
          POSTGRES_INITDB_ARGS: '--auth-host=scram-sha-256'
        ports:
          - 5432:5432
        # GHA service health check — block dependent steps until the
        # cluster is accepting connections. 10 retries × 5s = 50s ceiling,
        # well under the workflow timeout.
        options: >-
          --health-cmd "pg_isready -U payunivercart -d payunivercart_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://payunivercart:ci_password@localhost:5432/payunivercart_ci
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      # 1. Drizzle migrate — every SQL file in packages/db/drizzle must
      #    apply cleanly on a fresh DB. Failure here is the bug that
      #    took out /marketplace listings.
      - name: Drizzle migrate (fresh DB)
        run: pnpm --filter @payunivercart/db migrate

      # 2. Schema-drift guard — `pnpm generate` must produce a clean
      #    diff. A PR that changes a Drizzle table without regenerating
      #    the migration SQL would silently desync prod schema; this
      #    fails CI with the offending diff in the log.
      - name: Drizzle generate diff check
        run: |
          set -e
          pnpm --filter @payunivercart/db generate
          if ! git diff --exit-code packages/db/drizzle; then
            echo "::error::Drizzle schema drift: run 'pnpm --filter @payunivercart/db generate' and commit the resulting SQL."
            exit 1
          fi

      # 3. Re-run the test suite with DATABASE_URL pointed at the real
      #    Postgres. Unit-only suites that don't touch DATABASE_URL
      #    are no-ops; integration suites pick up the env automatically.
      - name: Integration tests
        run: pnpm test

  # --------------------------------------------------------------------- #
  # DOCKER — proves the multi-stage Dockerfile actually builds. We don't  #
  # ship the image (no registry push) — the goal is to catch the bug      #
  # class where a Dockerfile change works on the maintainer's machine but #
  # breaks the Coolify deploy pipeline (OOM, missing COPY, layer cache).  #
  # --------------------------------------------------------------------- #

  docker-build:
    name: Docker build (multi-stage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      # Build every runtime target the compose file references. Each
      # `--target` reruns BuildKit's incremental graph, so shared layers
      # (deps, src) only build once. Cache-from/to GHA-cache speeds repeat
      # runs from ~12 min to ~3 min.
      - name: Build api-runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api-runtime
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - name: Build workers-runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          target: workers-runtime
          push: false
          cache-from: type=gha,scope=workers
          cache-to: type=gha,mode=max,scope=workers
      - name: Build dashboard-runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dashboard-runtime
          push: false
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
      - name: Build checkout-runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          target: checkout-runtime
          push: false
          cache-from: type=gha,scope=checkout
          cache-to: type=gha,mode=max,scope=checkout
      - name: Build admin-runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          target: admin-runtime
          push: false
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

  # --------------------------------------------------------------------- #
  # SECURITY — three orthogonal scans. Failing any of them fails CI.      #
  #   - pnpm audit (prod + dev)   npm registry advisories                #
  #   - osv-scanner                Google OSV (broader, GHSA + others)    #
  #   - gitleaks (full history)   secret scanner over every commit       #
  # --------------------------------------------------------------------- #

  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history. Without this we missed past leaks.
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: pnpm audit (prod)
        # `--audit-level=high` is the lowest severity that fails the build.
        # Moderate/low are logged but don't block.
        run: pnpm audit --audit-level=high --prod

      - name: pnpm audit (dev)
        # Dev deps run during `pnpm build` so an RCE in esbuild / next
        # compilers / vitest still ships harm via the build pipeline.
        # Continue-on-error because dev advisories drag down PR velocity
        # when there's no upgrade path — surface, don't block.
        continue-on-error: true
        run: pnpm audit --audit-level=high --dev

      - name: OSV-Scanner (lockfile)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --recursive
            ./

      # Install gitleaks binary directly — the official action 403s on
      # Dependabot PRs (the bot's GITHUB_TOKEN can't be widened for a
      # third-party action).
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Gitleaks (secret scan)
        run: gitleaks detect --redact --verbose --exit-code 1

      # Trivy filesystem scan — picks up CVEs in the apt layer the
      # Dockerfile installs (postgresql-client, etc) by walking the
      # repo lockfiles + manifests. Cheap when the cache is warm.
      - name: Trivy filesystem scan
        # Pin to the major tag — patch versions ship weekly + the
        # specific `0.28.0` tag we tried first didn't exist. The major
        # tag is the maintained moving pointer for the v0 series.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # SARIF upload is gated on github_token write scope which we
          # don't grant; the human-readable table in the log is enough
          # for PR triage.
          format: table
          exit-code: '1'

  # --------------------------------------------------------------------- #
  # DEPENDENCY REVIEW — runs only on PRs. Compares the lockfile diff      #
  # against GitHub's advisory DB and BLOCKS the merge if a new high or    #
  # critical CVE landed. Fills the gap where pnpm audit catches existing  #
  # CVEs but not "PR adds vulnerable dep" specifically.                  #
  # --------------------------------------------------------------------- #

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
